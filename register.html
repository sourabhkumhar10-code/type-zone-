<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Type Zone — Register</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="centered">
  <div class="card auth-card">
    <h1 class="login-logo">Type Zone</h1>
    <p class="muted">Create an account to start playing</p>

    <form id="registerForm" class="stack" autocomplete="off">
      
      <label>Full Name
        <input id="fullName" type="text" placeholder="Your Name" required autocomplete="name" />
      </label>

      <label>Email (can be shared across multiple accounts)
        <input id="email" type="email" placeholder="you@example.com" required autocomplete="email" />
      </label>

      <label>Username (used for high scores - must be unique)
        <input id="username" type="text" placeholder="e.g. NewPlayer" required autocomplete="username" />
      </label>

      <label>Password
        <input id="password" type="password" placeholder="Choose a password" required autocomplete="new-password" />
      </label>

      <label>Confirm Password
        <input id="confirmPassword" type="password" placeholder="Re-enter password" required autocomplete="new-password" />
      </label>

      <button type="submit">Register</button>
      
      <p id="errorMsg" class="tiny" style="color: var(--bad); margin-top: 8px; min-height: 20px;"></p>
    </form>

    <p class="tiny muted">
        Already have an account? <a href="login.html" class="text-brand" style="font-weight: 700;">Login here.</a>
    </p>

    <p class="tiny muted">Note: Your account is saved on the Type Zone server with encrypted passwords.</p>
  </div>

  <script src="api.js"></script>
  <script src="auth.js"></script>
  <script src="register.js"></script>
</body>
</html>
